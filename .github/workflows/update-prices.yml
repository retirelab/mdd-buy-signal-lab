name: Update Price Data

on:
  schedule:
    - cron: '0 1 * * 2-6'   # 한국시간 기준 화~토 오전 10시 (UTC 01:00)
  workflow_dispatch:          # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # JSON 파일 커밋 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run update script
        run: python scripts/update_prices.py

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto update: $(date -u '+%Y-%m-%d')"
          git push
