<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MDD Target Tracker (Web App)</title>

  <script>
    window.__APP_MOUNTED__ = false;

    function shouldIgnoreError(msg) {
      if (!msg) return true;
      var lowerMsg = msg.toString().toLowerCase();
      if (lowerMsg.indexOf('resizeobserver') > -1) return true;
      if (lowerMsg.indexOf('script error') > -1) return true;
      if (lowerMsg.indexOf('non-error promise rejection') > -1) return true;
      return false;
    }

    function showFatalErrorBox(title, message) {
      setTimeout(function () {
        if (window.__APP_MOUNTED__ === true) return;
        var root = document.getElementById('root');
        if (root && root.innerHTML.indexOf('엔진을 초기화하는 중입니다') > -1) {
          root.innerHTML =
            '<div style="padding:20px;font-family:sans-serif;color:#e11d48;background:#fff1f2;border-radius:12px;margin:20px;text-align:center;">' +
            '<h3 style="margin-top:0;">' + title + '</h3><p>' + message + '</p></div>';
        }
      }, 1200);
    }

    window.onerror = function (msg) {
      if (shouldIgnoreError(msg)) return false;
      showFatalErrorBox('앱 초기화 실패', msg);
      return false;
    };

    window.onunhandledrejection = function (event) {
      var reason = event && event.reason ? event.reason.toString() : 'Unknown Error';
      if (shouldIgnoreError(reason)) return;
      showFatalErrorBox('비동기 작업 실패', reason);
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>

<body>
  <div id="root">

      <svg style="animation: spin 1s linear infinite; width: 40px; height: 40px; color: #3182f6; margin-bottom: 16px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

  <script type="text/babel" data-presets="react,env">
    const { useState, useMemo, useEffect, useRef } = React;

    // ------------------------------
    // Error Boundary
    // ------------------------------
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error: error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('React Crash:', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="p-6 m-4 bg-red-50 text-red-600 rounded-2xl border border-red-200 shadow-sm max-w-2xl mx-auto mt-10">
              <h3 className="font-bold text-lg mb-2">앱 렌더링 중 오류가 발생했습니다.</h3>
              <p className="text-sm bg-white p-3 rounded-lg overflow-auto border border-red-100">
                {this.state.error ? this.state.error.toString() : 'Unknown Error'}
              </p>
              <button
                onClick={() => window.location.reload()}
                className="mt-4 px-5 py-2.5 bg-red-100 font-bold rounded-xl text-red-700 hover:bg-red-200 transition-colors"
              >
                새로고침
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ------------------------------
    // Constants
    // ------------------------------
    const DEFAULT_SETTINGS = {
      symbol: 'SPY',
      startDate: '2010-01-01',
      endDate: '2026-12-31',
      targetRecoveryEtf: 0.80,
      targetRecoveryStock: 0.90,
      bandStep: 0.05,
      assetType: 'ETF',
      currencyMode: 'BOTH',
      primarySignalMode: 'USD',
      fearGreedIndex: 'Extreme Fear',
      cashReady: true,
      incomeGreater: true
    };

    const FALLBACK_ASSETS = [
      { symbol: 'SPY', name: 'SPDR S&P 500 ETF', assetType: 'ETF', enabled: true, defaultTargetRecovery: 0.80, defaultBandStep: 0.05 },
      { symbol: 'QQQ', name: 'Invesco QQQ Trust', assetType: 'ETF', enabled: true, defaultTargetRecovery: 0.80, defaultBandStep: 0.05 },
      { symbol: 'HYG', name: 'iShares iBoxx High Yield Corporate Bond ETF', assetType: 'ETF', enabled: true, defaultTargetRecovery: 0.80, defaultBandStep: 0.05 },
      { symbol: 'GLD', name: 'SPDR Gold Shares', assetType: 'ETF', enabled: true, defaultTargetRecovery: 0.80, defaultBandStep: 0.05 },
      { symbol: 'TLT', name: 'iShares 20+ Year Treasury Bond ETF', assetType: 'ETF', enabled: true, defaultTargetRecovery: 0.80, defaultBandStep: 0.05 }
    ];

    // ------------------------------
    // Sample Data
    // ------------------------------
    function generateSampleData(symbol) {
      const arr = [];
      let seed = 0;
      for (let i = 0; i < symbol.length; i++) {
        seed += symbol.charCodeAt(i);
      }

      let priceUsd = 100 + (seed % 30);
      let krwRate = 1200;
      const start = new Date('2010-01-01');

      for (let i = 0; i < 3000; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);

        if (d.getDay() !== 0 && d.getDay() !== 6) {
          const drift = 0.00045;
          const wave1 = Math.sin(i * 0.07) * 0.012;
          const wave2 = Math.cos(i * 0.013) * 0.006;
          const fxWave = Math.cos(i * 0.03) * 0.004;

          priceUsd = priceUsd * (1 + drift + wave1 + wave2);
          krwRate = krwRate * (1 + fxWave);

          arr.push({
            date: d.toISOString().split('T')[0],
            closeUsd: Number(priceUsd.toFixed(2)),
            closeKrw: Number((priceUsd * krwRate).toFixed(2))
          });
        }
      }
      return arr;
    }

    const SPY_SAMPLE_DATA = generateSampleData('SPY');

    // ------------------------------
    // Storage
    // ------------------------------
    function getSafeLocalStorage() {
      try {
        return window.localStorage;
      } catch (e) {
        return null;
      }
    }

    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const ls = getSafeLocalStorage();
          if (!ls) return initialValue;

          const item = ls.getItem(key);
          if (!item) return initialValue;

          const parsed = JSON.parse(item);

          if (
            typeof initialValue === 'object' &&
            initialValue !== null &&
            !Array.isArray(initialValue)
          ) {
            return { ...initialValue, ...parsed };
          }

          return parsed;
        } catch (error) {
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);

          const ls = getSafeLocalStorage();
          if (ls) {
            ls.setItem(key, JSON.stringify(valueToStore));
          }
        } catch (error) {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
        }
      };

      return [storedValue, setValue];
    }

    // ------------------------------
    // Utils & Date Helpers
    // ------------------------------
    function formatPct(val) {
      return (val * 100).toFixed(2) + '%';
    }

    function formatNum(val) {
      return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(val);
    }

    function filterRawDataByDateRange(data, start, end) {
      const startDate = new Date(start);
      const endDate = new Date(end);

      return data.filter((d) => {
        const date = new Date(d.date);
        return date >= startDate && date <= endDate;
      });
    }

    function getFirstValidKrwDate(data) {
      if (!data || !Array.isArray(data)) return null;
      const row = data.find(r => r.closeKrw !== null && Number.isFinite(Number(r.closeKrw)));
      return row ? row.date : null;
    }

    function getMaxDate(...dates) {
      const validDates = dates.filter(d => d && typeof d === 'string');
      if (validDates.length === 0) return null;
      return validDates.reduce((max, d) => d > max ? d : max, validDates[0]);
    }

    function getAnalysisDateInfo(rawData, settings, dataSource) {
      const usdRawStartDate = rawData.length > 0 ? rawData[0].date : null;
      let krwRawStartDate = getFirstValidKrwDate(rawData);

      if (dataSource === 'IMPORTED' || dataSource === 'SAMPLE') {
        if (!krwRawStartDate) krwRawStartDate = usdRawStartDate;
      }

      const requestedStartDate = settings.startDate;

      const usdEffectiveStartDate = getMaxDate(requestedStartDate, usdRawStartDate) || requestedStartDate;
      const krwEffectiveStartDate = getMaxDate(requestedStartDate, usdRawStartDate, krwRawStartDate) || requestedStartDate;

      return {
        usdRawStartDate,
        krwRawStartDate,
        requestedStartDate,
        usdEffectiveStartDate,
        krwEffectiveStartDate
      };
    }

    function normalizePriceRows(rows) {
      return rows
        .map((row) => {
          const date = row.date;
          const close = Number(
            row.close !== undefined ? row.close :
            row.closeUsd !== undefined ? row.closeUsd :
            row.price !== undefined ? row.price :
            row.adjClose !== undefined ? row.adjClose :
            NaN
          );

          return { date, close };
        })
        .filter((row) => {
          return typeof row.date === 'string' && Number.isFinite(row.close);
        })
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function normalizeFxRows(rows) {
      return rows
        .map((row) => {
          const date = row.date;
          const rate = Number(
            row.rate !== undefined ? row.rate :
            row.usdKrw !== undefined ? row.usdKrw :
            row.close !== undefined ? row.close :
            row.price !== undefined ? row.price :
            NaN
          );

          return { date, rate };
        })
        .filter((row) => {
          return typeof row.date === 'string' && Number.isFinite(row.rate);
        })
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function buildMergedSeries(priceData, fxData) {
      const sortedPrices = normalizePriceRows(priceData);
      const sortedFx = normalizeFxRows(fxData);

      if (sortedPrices.length === 0) return [];

      let fxIndex = 0;
      let currentRate = null;

      return sortedPrices.map((p) => {
        const pDate = p.date;

        while (fxIndex < sortedFx.length && sortedFx[fxIndex].date <= pDate) {
          currentRate = sortedFx[fxIndex].rate;
          fxIndex++;
        }

        return {
          date: p.date,
          closeUsd: Number(p.close),
          closeKrw: currentRate === null ? null : Number((p.close * currentRate).toFixed(2))
        };
      });
    }

    // ------------------------------
    // Core Engine
    // ------------------------------
    function runEngine(rawData, priceKey, settings) {
      const step = Number(settings.bandStep);
      if (!Number.isFinite(step) || step <= 0) return null;

      // null이 아닌 유효한 행만 필터링 (최초 환율 적용 전 날짜 등 자동 제외)
      const data = filterRawDataByDateRange(rawData, settings.startDate, settings.endDate)
        .filter((row) => row[priceKey] !== null && Number.isFinite(Number(row[priceKey])));

      if (data.length === 0) return null;

      let ath = -Infinity;
      let mdd = 0;
      let mddDate = null;
      const ddArray = [];
      const timeSeries = [];

      for (let i = 0; i < data.length; i++) {
        const d = data[i];
        const price = Number(d[priceKey]);

        if (price > ath) ath = price;

        const dd = (price / ath) - 1;
        ddArray.push(dd);

        if (dd < mdd) {
          mdd = dd;
          mddDate = d.date;
        }

        timeSeries.push({
          date: d.date,
          price: price,
          ath: ath,
          dd: dd
        });
      }

      const currentPrice = timeSeries[timeSeries.length - 1].price;
      const currentDd = timeSeries[timeSeries.length - 1].dd;
      const avgDd = ddArray.reduce((sum, val) => sum + val, 0) / ddArray.length;

      const recoveryTable = [];
      const tradingDays = ddArray.length;
      let prevThreshold = null;

      for (let t = 0; t >= -1; t -= step) {
        const threshold = Number(t.toFixed(4));
        const conditionDays = ddArray.filter((dd) => dd >= threshold).length;
        const recoveryRate = tradingDays > 0 ? conditionDays / tradingDays : 0;

        let bandConditionDays = 0;
        if (prevThreshold === null) {
          bandConditionDays = conditionDays;
        } else {
          bandConditionDays = ddArray.filter((dd) => dd >= threshold && dd < prevThreshold).length;
        }

        const bandWeight = tradingDays > 0 ? bandConditionDays / tradingDays : 0;

        recoveryTable.push({
          threshold,
          conditionDays,
          recoveryRate,
          bandConditionDays,
          bandWeight
        });

        prevThreshold = threshold;
      }

      const targetRecovery =
        settings.assetType === 'ETF'
          ? Number(settings.targetRecoveryEtf)
          : Number(settings.targetRecoveryStock);

      const targetRow = recoveryTable.find((r) => r.recoveryRate >= targetRecovery);
      const targetDd = targetRow ? targetRow.threshold : -1;
      const targetPrice = ath * (1 + targetDd);

      return {
        metrics: {
          ath,
          currentPrice,
          currentDd,
          mdd,
          mddDate,
          avgDd
        },
        recoveryTable: recoveryTable.reverse(),
        target: {
          rate: targetRecovery,
          dd: targetDd,
          price: targetPrice,
          signedGap: targetDd - currentDd,
          remainingDrop: currentPrice > 0 ? (targetPrice / currentPrice) - 1 : 0,
          isTriggered: currentDd <= targetDd
        },
        timeSeries
      };
    }

    // ------------------------------
    // UI Components
    // ------------------------------
    function Card(props) {
      const { title, children, className = '', titleRight = null } = props;

      return (
        <div className={`bg-white rounded-2xl shadow-card p-5 md:p-6 mb-6 ${className}`}>
          {(title || titleRight) && (
            <div className="flex justify-between items-center mb-5 gap-3">
              {title ? <h3 className="text-lg font-bold text-toss-text">{title}</h3> : <div />}
              {titleRight}
            </div>
          )}
          {children}
        </div>
      );
    }

    function Metric(props) {
      const { label, value, highlight } = props;
      return (
        <div className="flex flex-col">
          <span className="text-sm text-toss-subtext mb-1 font-medium">{label}</span>
          <span className={`text-xl md:text-2xl font-bold tracking-tight ${highlight ? 'text-toss-blue' : 'text-toss-text'}`}>
            {value}
          </span>
        </div>
      );
    }

    function Badge(props) {
      const { children, active, color = 'blue' } = props;

      const colors = {
        blue: active ? 'bg-toss-blue text-white' : 'bg-toss-light text-toss-blue',
        gray: active ? 'bg-gray-500 text-white' : 'bg-toss-gray text-toss-subtext',
        red: active ? 'bg-red-500 text-white' : 'bg-red-50 text-red-500',
        green: active ? 'bg-green-500 text-white' : 'bg-green-50 text-green-600'
      };

      return (
        <span className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${colors[color]}`}>
          {children}
        </span>
      );
    }

    function ResultBadge(props) {
      const { pass } = props;
      if (pass === null) return <Badge active={false} color="gray">SKIP</Badge>;
      if (pass) return <Badge active={true} color="green">PASS</Badge>;
      return <Badge active={true} color="red">FAIL</Badge>;
    }

    function DrawdownSvgChart(props) {
      const { data, targetDd, mode } = props;

      if (!data || data.length === 0) {
        return (
          <div className="flex justify-center items-center h-48 md:h-56 mt-6 bg-toss-gray/50 rounded-xl text-toss-subtext text-sm">
            차트 데이터 없음
          </div>
        );
      }

      const svgWidth = 1000;
      const svgHeight = 240;
      const padTop = 20;
      const padBottom = 20;
      const labelWidthPct = 12;
      const padLeft = 0;
      const padRight = svgWidth * (labelWidthPct / 100);

      const drawWidth = svgWidth - padLeft - padRight;
      const drawHeight = svgHeight - padTop - padBottom;

      const chartData = data.filter((_, i) => i % Math.max(1, Math.floor(data.length / 200)) === 0);
      if (chartData[chartData.length - 1].date !== data[data.length - 1].date) {
        chartData.push(data[data.length - 1]);
      }

      const n = chartData.length;
      let actualMdd = 0;
      chartData.forEach((d) => {
        if (d.dd < actualMdd) actualMdd = d.dd;
      });

      const minDdForScale = Math.min(actualMdd, targetDd, -0.05);
      const yMin = minDdForScale * 1.1;
      const yRange = 0 - yMin;

      const getX = (i) => padLeft + (n > 1 ? (i / (n - 1)) * drawWidth : 0);
      const getY = (dd) => padTop + ((-dd) / yRange) * drawHeight;

      const y0 = getY(0);
      const yTarget = getY(targetDd);
      const yMdd = getY(actualMdd);

      const isUSD = mode === 'USD';
      const strokeColor = isUSD ? '#3182f6' : '#20c997';
      const fillColor = isUSD ? '#e8f3ff' : '#e6f8f0';

      const linePoints = chartData.map((d, i) => `${getX(i)},${getY(d.dd)}`).join(' L ');
      const linePath = `M ${linePoints}`;
      const areaPath = `M ${getX(0)},${y0} L ${linePoints} L ${getX(n - 1)},${y0} Z`;

      const toPct = (val) => `${(val / svgHeight) * 100}%`;

      return (
        <div className="h-48 md:h-56 mt-6 w-full relative pointer-events-none select-none">
          <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full overflow-visible" preserveAspectRatio="none">
            <path d={areaPath} fill={fillColor} opacity="0.6" />
            <line x1={0} y1={y0} x2={drawWidth} y2={y0} stroke="#e5e8eb" strokeWidth="2" strokeDasharray="4 4" vectorEffect="non-scaling-stroke" />
            <line x1={0} y1={yTarget} x2={drawWidth} y2={yTarget} stroke="#f04452" strokeWidth="2" strokeDasharray="4 4" vectorEffect="non-scaling-stroke" />
            <path d={linePath} fill="none" stroke={strokeColor} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
          </svg>

          <div className="absolute top-0 right-0 h-full flex flex-col" style={{ width: `${labelWidthPct}%` }}>
            <div className="absolute right-0 text-xs text-toss-subtext font-medium bg-white/80 px-1 rounded" style={{ top: `calc(${toPct(y0)} - 8px)` }}>
              0%
            </div>
            <div className="absolute right-0 text-xs text-red-500 font-bold bg-white/80 px-1 rounded" style={{ top: `calc(${toPct(yTarget)} - 8px)` }}>
              {(targetDd * 100).toFixed(0)}%
            </div>
            <div className="absolute right-0 text-[10px] text-toss-subtext bg-white/80 px-1 rounded" style={{ top: `calc(${toPct(yMdd)} - 6px)` }}>
              {(actualMdd * 100).toFixed(1)}%
            </div>
          </div>
        </div>
      );
    }

    // ------------------------------
    // App
    // ------------------------------
    function App() {
      useEffect(() => {
        window.__APP_MOUNTED__ = true;
      }, []);

      const [activeTab, setActiveTab] = useState('dashboard');
      const [settings, setSettings] = useLocalStorage('mdd_settings_v5', DEFAULT_SETTINGS);
      const [reloadToken, setReloadToken] = useState(0);

      const [rawData, setRawData] = useState([]);
      const [dataSource, setDataSource] = useState('LOADING'); // LOADING | FETCHED | SAMPLE | IMPORTED
      const [assetsList, setAssetsList] = useState([]); 
      const [fetchStatus, setFetchStatus] = useState({
        assets: null,
        price: null,
        fx: null,
        error: null
      });

      const fileInputRef = useRef(null);

      // ------------------------------
      // Static JSON Loader
      // ------------------------------
      useEffect(() => {
        if (dataSource === 'IMPORTED') return;

        let isCancelled = false;

        async function loadData() {
          setDataSource('LOADING');
          
          if (!isCancelled) {
            setFetchStatus({
              assets: null,
              price: null,
              fx: null,
              error: null
            });
          }

          const nextStatus = {
            assets: false,
            price: false,
            fx: false,
            error: null
          };

          try {
            let assets = assetsList;

            // 1) assets.json
            if (!assets || assets.length === 0) {
              const asRes = await fetch('./data/assets.json').catch(() => null);

              if (asRes && asRes.ok) {
                const fetchedAssets = await asRes.json();
                if (Array.isArray(fetchedAssets) && fetchedAssets.length > 0) {
                  assets = fetchedAssets;
                  nextStatus.assets = true;
                } else {
                  assets = FALLBACK_ASSETS;
                  nextStatus.assets = false;
                }
              } else {
                assets = FALLBACK_ASSETS;
                nextStatus.assets = false;
              }

              if (!isCancelled) {
                setAssetsList(assets);
              }
            } else {
              nextStatus.assets = true;
            }

            // 2) price + fx
            const [priceRes, fxRes] = await Promise.all([
              fetch(`./data/prices/${settings.symbol}.json`).catch(() => null),
              fetch('./data/fx/USDKRW.json').catch(() => null)
            ]);

            if (!priceRes || !priceRes.ok) {
              throw new Error(`${settings.symbol}.json 가격 파일을 불러오지 못했습니다.`);
            }
            if (!fxRes || !fxRes.ok) {
              throw new Error('USDKRW 환율 파일을 불러오지 못해 KRW 계산을 수행할 수 없습니다. 현재는 샘플 또는 USD 전용으로 동작합니다.');
            }

            nextStatus.price = true;
            nextStatus.fx = true;

            const priceData = await priceRes.json();
            const fxData = await fxRes.json();

            const merged = buildMergedSeries(priceData, fxData);
            if (!merged || merged.length === 0) {
              throw new Error('병합된 시계열 데이터가 비어 있습니다.');
            }

            if (!isCancelled) {
              setRawData(merged);
              setDataSource('FETCHED');
              setFetchStatus(nextStatus);
            }
          } catch (err) {
            console.warn(err);
            nextStatus.error = err && err.message ? err.message : 'Unknown Error';

            if (!isCancelled) {
              setRawData(SPY_SAMPLE_DATA);
              setDataSource('SAMPLE');
              setFetchStatus(nextStatus);
            }
          }
        }

        loadData();

        return () => {
          isCancelled = true;
        };
      }, [settings.symbol, reloadToken]);

      const appState = useMemo(() => {
        let usdEngine = null;
        let krwEngine = null;
        let configWarning = null;

        const safeBandStep = Number(settings.bandStep);
        const dateInfo = getAnalysisDateInfo(rawData, settings, dataSource);

        if (!Number.isFinite(safeBandStep) || safeBandStep <= 0) {
          configWarning = 'Band Step은 0보다 큰 숫자여야 합니다.';
        } else if (rawData.length === 0 && dataSource !== 'LOADING') {
          configWarning = '지정된 날짜 범위에 유효한 데이터가 없습니다.';
        } else if (dataSource !== 'LOADING') {
          if (settings.currencyMode === 'USD' || settings.currencyMode === 'BOTH') {
            const usdSettings = { ...settings, startDate: dateInfo.usdEffectiveStartDate };
            usdEngine = runEngine(rawData, 'closeUsd', usdSettings);
          }
          
          if (settings.currencyMode === 'KRW' || settings.currencyMode === 'BOTH') {
            const krwSettings = { ...settings, startDate: dateInfo.krwEffectiveStartDate };
            krwEngine = runEngine(rawData, 'closeKrw', krwSettings);
            
            if (dateInfo.krwRawStartDate && settings.startDate < dateInfo.krwRawStartDate && settings.currencyMode !== 'USD') {
              configWarning = `KRW 분석은 환율 데이터가 존재하는 첫 날짜(${dateInfo.krwRawStartDate})부터만 유효합니다. KRW 엔진 시작일을 자동 보정했습니다.`;
            }
          }

          if (settings.currencyMode !== 'BOTH' && settings.currencyMode !== settings.primarySignalMode && !configWarning) {
            configWarning = '안내: Currency Mode와 Primary Signal 설정이 다릅니다.';
          }
        }

        const primaryEngine = settings.primarySignalMode === 'USD' ? usdEngine : krwEngine;
        const lifeGate = settings.cashReady && settings.incomeGreater;
        const fearGate = settings.fearGreedIndex === 'Extreme Fear';
        const ddGate = primaryEngine ? primaryEngine.target.isTriggered : false;
        const marketGate = fearGate && ddGate;
        const finalSignal = lifeGate && marketGate;

        return {
          usdEngine,
          krwEngine,
          configWarning,
          primaryEngine,
          dateInfo,
          gates: {
            lifeGate,
            fearGate,
            ddGate,
            marketGate,
            finalSignal
          }
        };
      }, [rawData, settings, dataSource]);

      function handleSettingChange(e) {
        const { name, value, type, checked } = e.target;
        setSettings((prev) => ({
          ...prev,
          [name]: type === 'checkbox' ? checked : (type === 'number' ? Number(value) : value)
        }));
      }

      function handleAssetChange(e) {
        const symbol = e.target.value;
        const assetInfo = assetsList.find((a) => a.symbol === symbol);

        setSettings((prev) => {
          const next = { ...prev, symbol: symbol };

          if (assetInfo) {
            next.assetType = assetInfo.assetType || prev.assetType;

            if (assetInfo.assetType === 'ETF' && assetInfo.defaultTargetRecovery !== undefined) {
              next.targetRecoveryEtf = assetInfo.defaultTargetRecovery;
            }

            if (assetInfo.assetType === 'STOCK' && assetInfo.defaultTargetRecovery !== undefined) {
              next.targetRecoveryStock = assetInfo.defaultTargetRecovery;
            }

            if (assetInfo.defaultBandStep !== undefined) {
              next.bandStep = assetInfo.defaultBandStep;
            }
          }

          return next;
        });

        setDataSource('LOADING');
        setReloadToken((prev) => prev + 1);
      }

      function handleReloadServerData() {
        setRawData([]);
        setDataSource('LOADING');
        setReloadToken((prev) => prev + 1);
      }

      function handleResetSampleData() {
        if (window.confirm('기본 SPY 샘플 데이터로 되돌리시겠습니까?')) {
          setSettings((prev) => ({
            ...prev,
            symbol: 'SPY',
            assetType: 'ETF'
          }));
          setRawData(SPY_SAMPLE_DATA);
          setDataSource('SAMPLE');
        }
      }

      function handleExport() {
        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(rawData, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute('href', dataStr);
        anchor.setAttribute('download', `${settings.symbol || 'MDD'}_raw_data_${new Date().toISOString().slice(0, 10)}.json`);
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      function handleTemplateDownload() {
        const template = [
          { "date": "2024-01-01", "closeUsd": 470.00, "closeKrw": 620000.00 },
          { "date": "2024-01-02", "closeUsd": 475.12, "closeKrw": 634512.33 },
          { "date": "2024-01-03", "closeUsd": 472.85, "closeKrw": 631120.44 }
        ];

        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(template, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute('href', dataStr);
        anchor.setAttribute('download', 'mdd_json_template.json');
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      function handleImport(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);

            if (!Array.isArray(parsed)) {
              throw new Error('JSON 최상위 구조는 배열([ ])이어야 합니다.');
            }

            if (parsed.length === 0) {
              throw new Error('배열에 데이터가 없습니다.');
            }

            const normalized = parsed.map((row, i) => {
              if (!row.date || typeof row.date !== 'string') {
                throw new Error(`${i + 1}번째 행: date 필드가 없거나 문자열이 아닙니다.`);
              }

              const usd = Number(row.closeUsd);
              const krw = Number(row.closeKrw);

              if (!Number.isFinite(usd)) {
                throw new Error(`${i + 1}번째 행: closeUsd 값이 유효한 숫자가 아닙니다.`);
              }

              if (!Number.isFinite(krw)) {
                throw new Error(`${i + 1}번째 행: closeKrw 값이 유효한 숫자가 아닙니다.`);
              }

              return {
                ...row,
                date: row.date,
                closeUsd: usd,
                closeKrw: krw
              };
            }).sort((a, b) => new Date(a.date) - new Date(b.date));

            setRawData(normalized);
            setDataSource('IMPORTED');
            alert(`총 ${normalized.length}행의 사용자 데이터를 성공적으로 불러왔습니다.`);
          } catch (err) {
            alert(`데이터 형식 오류:\n${err.message}`);
          }
        };

        reader.readAsText(file);
        e.target.value = '';
      }

      function applyPreset(preset) {
        setSettings((prev) => ({ ...prev, ...preset }));
      }

      function buildInterpretation() {
        if (dataSource === 'LOADING') {
          return ['데이터를 분석하고 있습니다...'];
        }

        const lines = [];

        if (!appState.primaryEngine) {
          return ['엔진 설정 문제로 분석을 수행하지 못했습니다. 설정 탭을 확인해주세요.'];
        }

        const e = appState.primaryEngine;
        lines.push(`분석된 데이터는 총 ${e.timeSeries.length}일치입니다.`);

        if (e.target.remainingDrop >= 0) {
          lines.push(`현재 하락폭(${formatPct(e.metrics.currentDd)})이 목표 하락폭(${formatPct(e.target.dd)})에 도달하여 규칙상 매수 가능 구간입니다.`);
        } else {
          lines.push(`현재 하락폭(${formatPct(e.metrics.currentDd)})이 목표 하락폭(${formatPct(e.target.dd)})보다 얕아 아직 규칙상 매수 대기 구간입니다.`);
        }

        if (appState.gates.fearGate) {
          lines.push(`공포 지수가 '${settings.fearGreedIndex}' 상태로 시장 게이트(Market Gate)가 열렸습니다.`);
        } else {
          lines.push(`공포 지수가 '${settings.fearGreedIndex}' 상태이므로 시장 게이트의 공포 조건이 충족되지 않았습니다.`);
        }

        if (appState.gates.lifeGate) {
          lines.push(`현금 확보 및 소득 조건이 모두 충족되어 생활 게이트(Life Gate)를 통과했습니다.`);
        } else {
          lines.push(`현금 또는 소득 조건이 미달되어 생활 게이트가 통과되지 않았습니다. 보수적 접근이 필요합니다.`);
        }

        if (appState.gates.finalSignal) {
          lines.push(`최종적으로 모든 매수 조건이 부합합니다. 자금 계획에 맞추어 분할 매수를 검토할 수 있습니다.`);
        } else {
          lines.push(`아직 모든 조건이 부합하지 않아 최종 실행 보류(WAIT) 상태입니다.`);
        }

        return lines;
      }

      function renderVerify() {
        let isAscending = true;

        for (let i = 0; i < rawData.length; i++) {
          if (rawData[i].closeUsd <= 0 || (rawData[i].closeKrw !== null && rawData[i].closeKrw <= 0)) {
            isPositive = false;
            break;

        const dateInfo = appState.dateInfo || {};
        const { usdRawStartDate, krwRawStartDate, requestedStartDate, usdEffectiveStartDate, krwEffectiveStartDate } = dateInfo;

        const validBandStep = Number.isFinite(Number(settings.bandStep)) && Number(settings.bandStep) > 0;
        
        const engine = appState.primaryEngine;

        const tests = [
          { id: 'F1', name: 'Assets 목록 로드 성공 여부', expected: 'TRUE', actual: fetchStatus.assets === true ? 'TRUE' : 'FALSE', pass: fetchStatus.assets === true },

          { id: 'F3', name: 'USDKRW 환율 로드 성공 여부', expected: 'TRUE', actual: fetchStatus.fx === true ? 'TRUE' : (dataSource === 'SAMPLE' || dataSource === 'IMPORTED' ? 'SKIP' : 'FALSE'), pass: dataSource === 'SAMPLE' || dataSource === 'IMPORTED' ? null : fetchStatus.fx === true },
          { id: 'D1', name: '날짜 오름차순 정렬 여부', expected: 'TRUE', actual: isAscending ? 'TRUE' : 'FALSE', pass: isAscending },
          { id: 'D2', name: '가격 양수 여부 검증', expected: 'TRUE', actual: isPositive ? 'TRUE' : 'FALSE', pass: isPositive },
          { id: 'D3', name: '유효한 Band Step 검증', expected: 'TRUE', actual: validBandStep ? 'TRUE' : 'FALSE', pass: validBandStep },
          { id: 'K1', name: 'KRW 유효 시작일 존재 여부', expected: 'TRUE', actual: krwRawStartDate ? 'TRUE' : 'FALSE', pass: !!krwRawStartDate },
          { id: 'K2', name: 'KRW 실분석 시작일 >= KRW 유효 시작일', expected: 'TRUE', actual: `${krwEffectiveStartDate} >= ${krwRawStartDate}`, pass: krwEffectiveStartDate >= krwRawStartDate },
          { id: 'K3', name: 'KRW 실분석 시작일 >= USD 원본 시작일', expected: 'TRUE', actual: `${krwEffectiveStartDate} >= ${usdRawStartDate}`, pass: krwEffectiveStartDate >= usdRawStartDate },
          { id: 'K4', name: 'USD 실분석 시작일 >= USD 원본 시작일', expected: 'TRUE', actual: `${usdEffectiveStartDate} >= ${usdRawStartDate}`, pass: usdEffectiveStartDate >= usdRawStartDate },
          { id: 'K5', name: '사용자 요청 시작일 정상 반영 여부', expected: 'TRUE', actual: requestedStartDate > usdRawStartDate ? `${usdEffectiveStartDate} === ${requestedStartDate}` : 'TRUE', pass: requestedStartDate > usdRawStartDate ? usdEffectiveStartDate === requestedStartDate : true },
          { id: 'E1', name: '엔진 실행 성공 여부', expected: 'TRUE', actual: engine ? 'TRUE' : 'FALSE', pass: engine ? true : false },
          { id: 'E2', name: '계산된 MDD가 0 이하인지', expected: '<= 0', actual: engine ? engine.metrics.mdd.toFixed(4) : 'N/A', pass: engine ? engine.metrics.mdd <= 0 : null },
          { id: 'E3', name: '최종 Buy Signal 논리 일치 여부', expected: appState.gates.finalSignal ? 'TRUE' : 'FALSE', actual: (appState.gates.lifeGate && appState.gates.marketGate) ? 'TRUE' : 'FALSE', pass: appState.gates.finalSignal === (appState.gates.lifeGate && appState.gates.marketGate) }
        ];

        return (
          <Card title="시스템 검증 (System Verification)">

      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
