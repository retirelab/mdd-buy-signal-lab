<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MDD Target Tracker (Win Rate Engine)</title>

  <script>
    window.__APP_MOUNTED__ = false;

    function shouldIgnoreError(msg) {
      if (!msg) return true;
      var lowerMsg = msg.toString().toLowerCase();
      if (lowerMsg.indexOf('resizeobserver') > -1) return true;
      if (lowerMsg.indexOf('script error') > -1) return true;
      if (lowerMsg.indexOf('non-error promise rejection') > -1) return true;
      return false;
    }

    function showFatalErrorBox(title, message) {
      setTimeout(function () {
        if (window.__APP_MOUNTED__ === true) return;
        var root = document.getElementById('root');
        if (root && root.innerHTML.indexOf('엔진을 초기화하는 중입니다') > -1) {
          root.innerHTML =
            '<div style="padding:20px;font-family:sans-serif;color:#e11d48;background:#fff1f2;border-radius:12px;margin:20px;text-align:center;">' +
            '<h3 style="margin-top:0;">' + title + '</h3><p>' + message + '</p></div>';
        }
      }, 1200);
    }

    window.onerror = function (msg) {
      if (shouldIgnoreError(msg)) return false;
      showFatalErrorBox('앱 초기화 실패', msg);
      return false;
    };

    window.onunhandledrejection = function (event) {
      var reason = event && event.reason ? event.reason.toString() : 'Unknown Error';
      if (shouldIgnoreError(reason)) return;
      showFatalErrorBox('비동기 작업 실패', reason);
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

<body>
  <div id="root">
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:#8b95a1;">
      <svg style="animation: spin 1s linear infinite; width: 40px; height: 40px; color: #3182f6; margin-bottom: 16px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p style="font-weight: 600;">엔진을 초기화하는 중입니다...</p>

  <script type="text/babel" data-presets="react,env">
    const { useState, useMemo, useEffect, useRef } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error: error };
      }
      componentDidCatch(error, errorInfo) {
        console.error('React Crash:', error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-6 m-4 bg-red-50 text-red-600 rounded-2xl border border-red-200 shadow-sm max-w-2xl mx-auto mt-10">
              <h3 className="font-bold text-lg mb-2">앱 렌더링 중 오류가 발생했습니다.</h3>
              <p className="text-sm bg-white p-3 rounded-lg overflow-auto border border-red-100">
                {this.state.error ? this.state.error.toString() : 'Unknown Error'}
              </p>
              <button
                onClick={() => window.location.reload()}
                className="mt-4 px-5 py-2.5 bg-red-100 font-bold rounded-xl text-red-700 hover:bg-red-200 transition-colors"
              >
                새로고침
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const THRESHOLD_SCALE = 10000;

    const DEFAULT_SETTINGS = {
      symbol: 'SPY',
      startDate: '2010-01-01',
      endDate: '2026-12-31',
      targetWinRateEtf: 0.80,
      targetWinRateStock: 0.90,
      engineStep: 0.01,
      tableDisplayStep: 0.05,
      assetType: 'ETF',
      currencyMode: 'BOTH',
      primarySignalMode: 'USD',
      fearGreedIndex: 'Extreme Fear',
      cashReady: true,
      incomeGreater: true
    };

    const FALLBACK_ASSETS = [
      { symbol: 'SPY', name: 'SPDR S&P 500 ETF Trust', assetType: 'ETF', enabled: true, defaultTargetWinRate: 0.80, defaultEngineStep: 0.01, defaultTableDisplayStep: 0.05 },
      { symbol: 'QQQ', name: 'Invesco QQQ Trust', assetType: 'ETF', enabled: true, defaultTargetWinRate: 0.80, defaultEngineStep: 0.01, defaultTableDisplayStep: 0.05 },
      { symbol: 'HYG', name: 'iShares iBoxx $ High Yield Corporate Bond ETF', assetType: 'ETF', enabled: true, defaultTargetWinRate: 0.80, defaultEngineStep: 0.01, defaultTableDisplayStep: 0.05 },
      { symbol: 'GLD', name: 'SPDR Gold Shares', assetType: 'ETF', enabled: true, defaultTargetWinRate: 0.80, defaultEngineStep: 0.01, defaultTableDisplayStep: 0.05 },
      { symbol: 'TLT', name: 'iShares 20+ Year Treasury Bond ETF', assetType: 'ETF', enabled: true, defaultTargetWinRate: 0.80, defaultEngineStep: 0.01, defaultTableDisplayStep: 0.05 }
    ];

    function generateSampleData(symbol) {
      const arr = [];
      let seed = 0;
      for (let i = 0; i < symbol.length; i++) seed += symbol.charCodeAt(i);

      let priceUsd = 100 + (seed % 30);
      let krwRate = 1200;
      const start = new Date('2010-01-01');

      for (let i = 0; i < 3000; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);

        if (d.getDay() !== 0 && d.getDay() !== 6) {
          const drift = 0.00045;
          const wave1 = Math.sin(i * 0.07) * 0.012;
          const wave2 = Math.cos(i * 0.013) * 0.006;
          const fxWave = Math.cos(i * 0.03) * 0.004;

          priceUsd = priceUsd * (1 + drift + wave1 + wave2);
          krwRate = krwRate * (1 + fxWave);

          arr.push({
            date: d.toISOString().split('T')[0],
            closeUsd: Number(priceUsd.toFixed(2)),
            closeKrw: Number((priceUsd * krwRate).toFixed(2))
          });
        }
      }
      return arr;
    }

    function getSafeLocalStorage() {
      try { return window.localStorage; } catch (e) { return null; }
    }

    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const ls = getSafeLocalStorage();
          if (!ls) return initialValue;
          const item = ls.getItem(key);
          if (!item) return initialValue;
          const parsed = JSON.parse(item);
          if (typeof initialValue === 'object' && initialValue !== null && !Array.isArray(initialValue)) {
            return { ...initialValue, ...parsed };
          }
          return parsed;
        } catch (error) {
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          const ls = getSafeLocalStorage();
          if (ls) ls.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
        }
      };

      return [storedValue, setValue];
    }

    function isValidPositiveNumber(value) {
      return (
        value !== null &&
        value !== undefined &&
        value !== '' &&
        Number.isFinite(Number(value)) &&
        Number(value) > 0
      );
    }

    function formatPct(val) {
      if (val === null || val === undefined || !Number.isFinite(val)) return '-';
      return (val * 100).toFixed(2) + '%';
    }

    function formatNum(val) {
      if (val === null || val === undefined || !Number.isFinite(val)) return '-';
      return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(val);
    }

    function formatDays(val) {
      if (val === null || val === undefined || !Number.isFinite(val)) return '-';
      return Math.round(val) + '일';
    }

    function isoMaxDate(...dates) {
      const valid = dates.filter(Boolean);
      if (valid.length === 0) return null;
      return valid.sort((a, b) => a.localeCompare(b))[valid.length - 1];
    }

    function toThresholdInt(value) {
      return Math.round(Number(value) * THRESHOLD_SCALE);
    }

    function fromThresholdInt(valueInt) {
      return Number((valueInt / THRESHOLD_SCALE).toFixed(4));
    }

    function sameThreshold(a, b) {
      if (a === null || a === undefined || b === null || b === undefined) return false;
      return toThresholdInt(a) === toThresholdInt(b);
    }

    function filterRawDataByDateRange(data, start, end, priceKey) {
      return data.filter((d) => {
        const inRange = d.date >= start && d.date <= end;
        const hasValue = isValidPositiveNumber(d[priceKey]);
        return inRange && hasValue;
      });
    }

    function normalizePriceRows(rows) {
      return rows
        .map((row) => {
          const date = row.date;
          const close = Number(
            row.close !== undefined ? row.close :
            row.closeUsd !== undefined ? row.closeUsd :
            row.price !== undefined ? row.price :
            row.adjClose !== undefined ? row.adjClose :
            NaN
          );
          return { date, close };
        })
        .filter((row) => typeof row.date === 'string' && Number.isFinite(row.close))
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function normalizeFxRows(rows) {
      return rows
        .map((row) => {
          const date = row.date;
          const rate = Number(
            row.rate !== undefined ? row.rate :
            row.usdKrw !== undefined ? row.usdKrw :
            row.close !== undefined ? row.close :
            row.price !== undefined ? row.price :
            NaN
          );
          return { date, rate };
        })
        .filter((row) => typeof row.date === 'string' && Number.isFinite(row.rate))
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function buildMergedSeries(priceData, fxData) {
      const sortedPrices = normalizePriceRows(priceData);
      const sortedFx = normalizeFxRows(fxData);

      if (sortedPrices.length === 0) return [];

      let fxIndex = 0;
      let currentRate = null;

      return sortedPrices.map((p) => {
        while (fxIndex < sortedFx.length && sortedFx[fxIndex].date <= p.date) {
          currentRate = sortedFx[fxIndex].rate;
          fxIndex++;
        }

        const closeKrw = isValidPositiveNumber(currentRate)
          ? Number((Number(p.close) * Number(currentRate)).toFixed(2))
          : null;

        return {
          date: p.date,
          closeUsd: Number(p.close),
          closeKrw
        };
      });
    }

    function getDataMeta(rawData, requestedStart) {
      const usdFirst = rawData.find((r) => isValidPositiveNumber(r.closeUsd));
      const krwFirst = rawData.find((r) => isValidPositiveNumber(r.closeKrw));

      const usdFirstDate = usdFirst ? usdFirst.date : null;
      const krwFirstDate = krwFirst ? krwFirst.date : null;

      const usdAnalysisStart = isoMaxDate(requestedStart, usdFirstDate);
      const krwAnalysisStart = isoMaxDate(requestedStart, usdFirstDate, krwFirstDate);

      return {
        usdFirstDate,
        krwFirstDate,
        usdAnalysisStart,
        krwAnalysisStart
      };
    }

    function median(values) {
      if (!values || values.length === 0) return null;
      const sorted = [...values].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      if (sorted.length % 2 === 0) return (sorted[mid - 1] + sorted[mid]) / 2;
      return sorted[mid];
    }

    function buildThresholdList(minDd, step) {
      const stepInt = Math.max(1, toThresholdInt(step));
      const deepestInt = Math.max(
        stepInt,
        Math.ceil((Math.abs(minDd) * THRESHOLD_SCALE) / stepInt) * stepInt
      );

      const thresholds = [];
      for (let depthInt = stepInt; depthInt <= deepestInt; depthInt += stepInt) {
        thresholds.push(-fromThresholdInt(depthInt));
      }
      return thresholds;
    }

    function getCurrentBandThreshold(currentDd, engineStep) {
      if (!Number.isFinite(currentDd) || !Number.isFinite(engineStep) || engineStep <= 0) return null;
      if (Math.abs(currentDd) < engineStep) return null;

      const stepInt = Math.max(1, toThresholdInt(engineStep));
      const currentAbsInt = Math.floor(Math.abs(currentDd) * THRESHOLD_SCALE + 0.0001);
      const bandInt = Math.floor(currentAbsInt / stepInt) * stepInt;

      if (bandInt < stepInt) return null;
      return -fromThresholdInt(bandInt);
    }

    function buildAverageDownWinRateTable(timeSeries, engineStep) {
      if (!timeSeries || timeSeries.length === 0) return [];

      const ddValues = timeSeries.map((x) => x.dd);
      const minDd = Math.min.apply(null, ddValues);
      const thresholds = buildThresholdList(minDd, engineStep);

      return thresholds.map((threshold) => {
        const signalIndexes = [];

        for (let i = 0; i < timeSeries.length; i++) {
          const currDd = timeSeries[i].dd;
          const prevDd = i > 0 ? timeSeries[i - 1].dd : null;
          const crossedDown = currDd <= threshold && (i === 0 || prevDd > threshold);
          if (crossedDown) signalIndexes.push(i);
        }

        let winCount = 0;
        let loseCount = 0;
        const recoveryDaysList = [];

        signalIndexes.forEach((entryIndex) => {
          const entryPrice = timeSeries[entryIndex].price;
          let recoveredIndex = null;

          for (let j = entryIndex + 1; j < timeSeries.length; j++) {
            if (timeSeries[j].price >= entryPrice) {
              recoveredIndex = j;
              break;
            }
          }

          if (recoveredIndex !== null) {
            winCount += 1;
            recoveryDaysList.push(recoveredIndex - entryIndex);
          } else {
            loseCount += 1;
          }
        });

        const signalCount = signalIndexes.length;
        const winRate = signalCount > 0 ? winCount / signalCount : null;
        const avgRecoveryDays = recoveryDaysList.length > 0
          ? recoveryDaysList.reduce((sum, v) => sum + v, 0) / recoveryDaysList.length
          : null;
        const medianRecoveryDays = median(recoveryDaysList);

        return {
          threshold,
          thresholdInt: toThresholdInt(threshold),
          signalCount,
          winCount,
          loseCount,
          winRate,
          avgRecoveryDays,
          medianRecoveryDays
        };
      });
    }

    function buildDisplayWinRateTable(fullTable, engineStep, tableDisplayStep, targetDd, currentBandThreshold) {
      if (!fullTable || fullTable.length === 0) return [];

      const everyN = Math.max(1, Math.round(Number(tableDisplayStep) / Number(engineStep)));
      if (fullTable.length <= Math.max(30, everyN * 8)) return fullTable;

      const includeIndexes = new Set();

      for (let i = 0; i < fullTable.length; i += everyN) {
        includeIndexes.add(i);
      }

      includeIndexes.add(0);
      includeIndexes.add(fullTable.length - 1);

      function addWindow(centerIndex, radius) {
        if (centerIndex < 0) return;
        for (let i = centerIndex - radius; i <= centerIndex + radius; i++) {
          if (i >= 0 && i < fullTable.length) includeIndexes.add(i);
        }
      }

      const targetIndex = fullTable.findIndex((r) => sameThreshold(r.threshold, targetDd));
      const currentIndex = fullTable.findIndex((r) => sameThreshold(r.threshold, currentBandThreshold));

      addWindow(targetIndex, 3);
      addWindow(currentIndex, 3);

      return fullTable.filter((_, idx) => includeIndexes.has(idx));
    }

    function runEngine(rawData, priceKey, analysisStart, analysisEnd, settings) {
      const engineStep = Number(settings.engineStep);
      if (!Number.isFinite(engineStep) || engineStep <= 0) return null;
      if (!analysisStart || !analysisEnd) return null;

      const data = filterRawDataByDateRange(rawData, analysisStart, analysisEnd, priceKey);
      if (!data || data.length === 0) return null;

      let ath = -Infinity;
      let mdd = 0;
      let mddDate = null;
      let mddIndex = null;
      const ddArray = [];
      const timeSeries = [];

      for (let i = 0; i < data.length; i++) {
        const d = data[i];
        const price = Number(d[priceKey]);

        if (!isValidPositiveNumber(price)) continue;

        if (price > ath) ath = price;
        if (!(ath > 0)) continue;

        const dd = (price / ath) - 1;
        if (!Number.isFinite(dd)) continue;

        ddArray.push(dd);

        if (dd < mdd) {
          mdd = dd;
          mddDate = d.date;
          mddIndex = timeSeries.length;
        }

        timeSeries.push({
          date: d.date,
          price,
          ath,
          dd
        });
      }

      if (timeSeries.length === 0) return null;

      const currentPrice = timeSeries[timeSeries.length - 1].price;
      const currentDd = timeSeries[timeSeries.length - 1].dd;
      const avgDd = ddArray.reduce((sum, val) => sum + val, 0) / ddArray.length;

      const winRateTableFull = buildAverageDownWinRateTable(timeSeries, engineStep);

      const targetWinRate =
        settings.assetType === 'ETF'
          ? Number(settings.targetWinRateEtf)
          : Number(settings.targetWinRateStock);

      let targetRow = null;
      for (let i = 0; i < winRateTableFull.length; i++) {
        const row = winRateTableFull[i];
        if (row.signalCount > 0 && row.winRate !== null && row.winRate >= targetWinRate) {
          targetRow = row;
          break;
        }
      }

      if (!targetRow) {
        const rowsWithSignals = winRateTableFull.filter((r) => r.signalCount > 0);
        targetRow = rowsWithSignals.length > 0 ? rowsWithSignals[rowsWithSignals.length - 1] : null;
      }

      const targetDd = targetRow ? targetRow.threshold : null;
      const targetPrice = targetDd !== null ? ath * (1 + targetDd) : null;
      const gapToTarget = (targetPrice !== null && currentPrice > 0)
        ? (currentPrice - targetPrice) / currentPrice
        : null;

      const currentBandThreshold = getCurrentBandThreshold(currentDd, engineStep);

      const winRateTableDisplay = buildDisplayWinRateTable(
        winRateTableFull,
        Number(settings.engineStep),
        Number(settings.tableDisplayStep),
        targetDd,
        currentBandThreshold
      );

      return {
        metrics: {
          ath,
          currentPrice,
          currentDd,
          mdd,
          mddDate,
          mddIndex,
          avgDd
        },
        analysisStart,
        analysisEnd,
        currentBandThreshold,
        winRateTableFull,
        winRateTableDisplay,
        target: {
          targetWinRate,
          dd: targetDd,
          price: targetPrice,
          gapToTarget,
          isTriggered: targetDd !== null ? currentDd <= targetDd : false,
          signalCount: targetRow ? targetRow.signalCount : 0,
          winRate: targetRow ? targetRow.winRate : null,
          medianRecoveryDays: targetRow ? targetRow.medianRecoveryDays : null,
          avgRecoveryDays: targetRow ? targetRow.avgRecoveryDays : null
        },
        timeSeries
      };
    }

    function Card({ title, children, className = '', titleRight = null }) {
      return (
        <div className={`bg-white rounded-2xl shadow-card p-5 md:p-6 mb-6 ${className}`}>
          {(title || titleRight) && (
            <div className="flex justify-between items-center mb-5 gap-3">
              {title ? <h3 className="text-lg font-bold text-toss-text">{title}</h3> : <div />}
              {titleRight}
            </div>
          )}
          {children}
        </div>
      );
    }

    function Metric({ label, value, highlight }) {
      return (
        <div className="flex flex-col">
          <span className="text-sm text-toss-subtext mb-1 font-medium">{label}</span>
          <span className={`text-xl md:text-2xl font-bold tracking-tight ${highlight ? 'text-toss-blue' : 'text-toss-text'}`}>
            {value}
          </span>
        </div>
      );
    }

    function Badge({ children, active, color = 'blue' }) {
      const colors = {
        blue: active ? 'bg-toss-blue text-white' : 'bg-toss-light text-toss-blue',
        gray: active ? 'bg-gray-500 text-white' : 'bg-toss-gray text-toss-subtext',
        red: active ? 'bg-red-500 text-white' : 'bg-red-50 text-red-500',
        green: active ? 'bg-green-500 text-white' : 'bg-green-50 text-green-600',
        amber: active ? 'bg-amber-500 text-white' : 'bg-amber-50 text-amber-700'
      };
      return (
        <span className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${colors[color]}`}>
          {children}
        </span>
      );
    }

    function ResultBadge({ pass }) {
      if (pass === null) return <Badge active={false} color="gray">SKIP</Badge>;
      if (pass) return <Badge active={true} color="green">PASS</Badge>;
      return <Badge active={true} color="red">FAIL</Badge>;
    }

    function DrawdownSvgChart({ data, targetDd, mode }) {
      if (!data || data.length === 0) {
        return (
          <div className="flex justify-center items-center h-56 mt-6 bg-toss-gray/50 rounded-xl text-toss-subtext text-sm">
            차트 데이터 없음
          </div>
        );
      }

      const svgWidth = 1000;
      const svgHeight = 260;
      const padTop = 20;
      const padBottom = 24;
      const labelWidthPct = 13;
      const padLeft = 0;
      const padRight = svgWidth * (labelWidthPct / 100);
      const drawWidth = svgWidth - padLeft - padRight;
      const drawHeight = svgHeight - padTop - padBottom;

      const sampleEvery = Math.max(1, Math.floor(data.length / 220));
      const chartData = data.filter((_, i) => i % sampleEvery === 0);
      if (chartData[chartData.length - 1].date !== data[data.length - 1].date) {
        chartData.push(data[data.length - 1]);
      }

      const n = chartData.length;
      const currentPoint = chartData[chartData.length - 1];

      let mddPoint = chartData[0];
      chartData.forEach((d) => {
        if (d.dd < mddPoint.dd) mddPoint = d;
      });

      const compareCandidates = [mddPoint.dd, currentPoint.dd, -0.05];
      if (Number.isFinite(targetDd)) compareCandidates.push(targetDd);
      const minDdForScale = Math.min.apply(null, compareCandidates);
      const yMin = minDdForScale * 1.12;
      const yRange = 0 - yMin;

      const getX = (i) => padLeft + (n > 1 ? (i / (n - 1)) * drawWidth : 0);
      const getY = (dd) => padTop + ((-dd) / yRange) * drawHeight;

      const y0 = getY(0);
      const yTarget = Number.isFinite(targetDd) ? getY(targetDd) : null;
      const yCurrent = getY(currentPoint.dd);
      const yMdd = getY(mddPoint.dd);

      const xCurrent = getX(chartData.length - 1);
      const xMdd = getX(chartData.findIndex((d) => d.date === mddPoint.date && d.dd === mddPoint.dd));

      const isUSD = mode === 'USD';
      const strokeColor = isUSD ? '#3182f6' : '#20c997';
      const fillColor = isUSD ? '#e8f3ff' : '#e6f8f0';

      const linePoints = chartData.map((d, i) => `${getX(i)},${getY(d.dd)}`).join(' L ');
      const linePath = `M ${linePoints}`;
      const areaPath = `M ${getX(0)},${y0} L ${linePoints} L ${getX(n - 1)},${y0} Z`;

      const clampYText = (value) => Math.max(12, Math.min(svgHeight - 8, value));
      const rightLabelTop = (val) => `calc(${(val / svgHeight) * 100}% - 8px)`;

      return (
        <div className="h-56 md:h-64 mt-6 w-full relative select-none">
          <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full overflow-visible" preserveAspectRatio="none">
            <path d={areaPath} fill={fillColor} opacity="0.62" />
            <line x1={0} y1={y0} x2={drawWidth} y2={y0} stroke="#e5e8eb" strokeWidth="2" strokeDasharray="4 4" vectorEffect="non-scaling-stroke" />
            {Number.isFinite(yTarget) && (
              <line x1={0} y1={yTarget} x2={drawWidth} y2={yTarget} stroke="#f04452" strokeWidth="2" strokeDasharray="5 5" vectorEffect="non-scaling-stroke" />
            )}
            <path d={linePath} fill="none" stroke={strokeColor} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke" />

            {Number.isFinite(yTarget) && (
              <circle cx={xCurrent} cy={yTarget} r="4.5" fill="#f04452" />
            )}

            <circle cx={xCurrent} cy={yCurrent} r="4.5" fill={strokeColor} />
            <circle cx={xMdd} cy={yMdd} r="5" fill="#ef4444" />

            <text x={Math.max(10, xCurrent - 88)} y={clampYText(yCurrent - 10)} fontSize="16" fontWeight="700" fill={strokeColor}>
              Now {formatPct(currentPoint.dd)}
            </text>

            <text x={Math.min(drawWidth - 70, xMdd + 8)} y={clampYText(yMdd - 10)} fontSize="16" fontWeight="700" fill="#ef4444">
              MDD {formatPct(mddPoint.dd)}
            </text>

            {Number.isFinite(yTarget) && (
              <text x={Math.max(10, xCurrent - 95)} y={clampYText(yTarget - 10)} fontSize="16" fontWeight="700" fill="#f04452">
                Target {formatPct(targetDd)}
              </text>
            )}
          </svg>

          <div className="absolute top-0 right-0 h-full flex flex-col" style={{ width: `${labelWidthPct}%` }}>
            <div className="absolute right-0 text-xs text-toss-subtext font-medium bg-white/80 px-1 rounded" style={{ top: rightLabelTop(y0) }}>0%</div>
            {Number.isFinite(yTarget) && (
              <div className="absolute right-0 text-xs text-red-500 font-bold bg-white/80 px-1 rounded" style={{ top: rightLabelTop(yTarget) }}>
                {formatPct(targetDd)}
              </div>
            )}
            <div className="absolute right-0 text-[10px] text-toss-subtext bg-white/80 px-1 rounded" style={{ top: rightLabelTop(yMdd) }}>
              {formatPct(mddPoint.dd)}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      useEffect(() => { window.__APP_MOUNTED__ = true; }, []);

      const [activeTab, setActiveTab] = useState('dashboard');
      const [settings, setSettings] = useLocalStorage('mdd_settings_winrate_v5', DEFAULT_SETTINGS);
      const [reloadToken, setReloadToken] = useState(0);

      const [rawData, setRawData] = useState([]);
      const [dataSource, setDataSource] = useState('LOADING');
      const [manualMode, setManualMode] = useState(null); // null | SAMPLE | IMPORTED

      const [assetsList, setAssetsList] = useState(FALLBACK_ASSETS);
      const [fetchStatus, setFetchStatus] = useState({
        assets: null,
        price: null,
        fx: null,
        error: null
      });

      const [fallbackSampleData] = useState(() => generateSampleData('SPY'));
      const fileInputRef = useRef(null);

      useEffect(() => {
        let isCancelled = false;

        fetch('./data/assets.json')
          .then((res) => (res.ok ? res.json() : null))
          .then((data) => {
            if (isCancelled) return;
            if (Array.isArray(data) && data.length > 0) {
              setAssetsList(data);
              setFetchStatus((prev) => ({ ...prev, assets: true }));
            } else {
              setFetchStatus((prev) => ({ ...prev, assets: false }));
            }
          })
          .catch(() => {
            if (!isCancelled) {
              setFetchStatus((prev) => ({ ...prev, assets: false }));
            }
          });

        return () => { isCancelled = true; };
      }, []);

      useEffect(() => {
        if (manualMode === 'IMPORTED' || manualMode === 'SAMPLE') return;

        let isCancelled = false;

        async function loadPriceAndFx() {
          setDataSource('LOADING');

          const nextStatus = { assets: fetchStatus.assets, price: false, fx: false, error: null };

          try {
            const [priceRes, fxRes] = await Promise.all([
              fetch(`./data/prices/${settings.symbol}.json`).catch(() => null),
              fetch('./data/fx/USDKRW.json').catch(() => null)
            ]);

            if (!priceRes || !priceRes.ok) {
              throw new Error(`${settings.symbol}.json 가격 파일을 불러오지 못했습니다.`);
            }
            if (!fxRes || !fxRes.ok) {
              throw new Error('USDKRW.json 환율 파일을 불러오지 못했습니다.');
            }

            nextStatus.price = true;
            nextStatus.fx = true;

            const priceData = await priceRes.json();
            const fxData = await fxRes.json();

            const merged = buildMergedSeries(priceData, fxData);
            if (!merged || merged.length === 0) {
              throw new Error('병합된 시계열 데이터가 비어 있습니다.');
            }

            if (!isCancelled) {
              setRawData(merged);
              setDataSource('FETCHED');
              setFetchStatus(nextStatus);
            }
          } catch (err) {
            nextStatus.error = err && err.message ? err.message : 'Unknown Error';
            if (!isCancelled) {
              setRawData(fallbackSampleData);
              setDataSource('SAMPLE');
              setFetchStatus(nextStatus);
            }
          }
        }

        loadPriceAndFx();

        return () => { isCancelled = true; };
      }, [settings.symbol, reloadToken, manualMode]);

      const meta = useMemo(
        () => getDataMeta(rawData, settings.startDate),
        [rawData, settings.startDate]
      );

      const appState = useMemo(() => {
        let usdEngine = null;
        let krwEngine = null;
        let configWarning = null;

        const safeEngineStep = Number(settings.engineStep);
        const safeTableStep = Number(settings.tableDisplayStep);

        if (!Number.isFinite(safeEngineStep) || safeEngineStep <= 0) {
          configWarning = '승률 엔진 단위는 0보다 큰 숫자여야 합니다.';
        } else if (!Number.isFinite(safeTableStep) || safeTableStep <= 0) {
          configWarning = '테이블 표시 간격은 0보다 큰 숫자여야 합니다.';
        } else if (dataSource !== 'LOADING') {
          if (settings.currencyMode === 'USD' || settings.currencyMode === 'BOTH') {
            usdEngine = runEngine(rawData, 'closeUsd', meta.usdAnalysisStart, settings.endDate, settings);
          }
          if (settings.currencyMode === 'KRW' || settings.currencyMode === 'BOTH') {
            krwEngine = runEngine(rawData, 'closeKrw', meta.krwAnalysisStart, settings.endDate, settings);
          }

          const usdCount = usdEngine ? usdEngine.timeSeries.length : 0;
          const krwCount = krwEngine ? krwEngine.timeSeries.length : 0;

          if (usdCount === 0 && krwCount === 0) {
            configWarning = '지정된 날짜 범위에 유효한 데이터가 없습니다.';
          } else if (settings.currencyMode !== 'BOTH' && settings.currencyMode !== settings.primarySignalMode) {
            configWarning = '안내: Currency Mode와 Primary Signal 설정이 다릅니다.';
          }
        }

        const primaryEngine = settings.primarySignalMode === 'USD' ? usdEngine : krwEngine;
        const lifeGate = settings.cashReady && settings.incomeGreater;
        const fearGate = settings.fearGreedIndex === 'Extreme Fear';
        const ddGate = primaryEngine ? primaryEngine.target.isTriggered : false;
        const marketGate = fearGate && ddGate;
        const finalSignal = lifeGate && marketGate;

        return {
          usdEngine,
          krwEngine,
          primaryEngine,
          configWarning,
          gates: { lifeGate, fearGate, ddGate, marketGate, finalSignal }
        };
      }, [rawData, settings, dataSource, meta]);

      function handleSettingChange(e) {
        const { name, value, type, checked } = e.target;
        setSettings((prev) => ({
          ...prev,
          [name]: type === 'checkbox' ? checked : (type === 'number' ? Number(value) : value)
        }));
      }

      function handleAssetChange(e) {
        const symbol = e.target.value;
        const assetInfo = assetsList.find((a) => a.symbol === symbol);

        if (manualMode) setManualMode(null);

        setSettings((prev) => {
          const next = { ...prev, symbol };
          if (assetInfo) {
            next.assetType = assetInfo.assetType || prev.assetType;
            if (assetInfo.assetType === 'ETF' && assetInfo.defaultTargetWinRate !== undefined) {
              next.targetWinRateEtf = assetInfo.defaultTargetWinRate;
            }
            if (assetInfo.assetType === 'STOCK' && assetInfo.defaultTargetWinRate !== undefined) {
              next.targetWinRateStock = assetInfo.defaultTargetWinRate;
            }
            if (assetInfo.defaultEngineStep !== undefined) {
              next.engineStep = assetInfo.defaultEngineStep;
            }
            if (assetInfo.defaultTableDisplayStep !== undefined) {
              next.tableDisplayStep = assetInfo.defaultTableDisplayStep;
            }
          }
          return next;
        });

        setDataSource('LOADING');
        setReloadToken((prev) => prev + 1);
      }

      function handleReloadServerData() {
        setManualMode(null);
        setRawData([]);
        setDataSource('LOADING');
        setReloadToken((prev) => prev + 1);
      }

      function handleResetSampleData() {
        if (window.confirm('기본 SPY 샘플 데이터로 되돌리시겠습니까?')) {
          setManualMode('SAMPLE');
          setSettings((prev) => ({
            ...prev,
            symbol: 'SPY',
            assetType: 'ETF',
            targetWinRateEtf: 0.80,
            engineStep: 0.01,
            tableDisplayStep: 0.05
          }));
          setRawData(fallbackSampleData);
          setDataSource('SAMPLE');
          setFetchStatus((prev) => ({ ...prev, error: null }));
        }
      }

      function handleExport() {
        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(rawData, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute('href', dataStr);
        anchor.setAttribute('download', `${settings.symbol || 'MDD'}_raw_data_${new Date().toISOString().slice(0, 10)}.json`);
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      function handleTemplateDownload() {
        const template = [
          { "date": "2024-01-01", "closeUsd": 470.00, "closeKrw": 620000.00 },
          { "date": "2024-01-02", "closeUsd": 475.12, "closeKrw": 634512.33 },
          { "date": "2024-01-03", "closeUsd": 472.85, "closeKrw": null }
        ];
        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(template, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute('href', dataStr);
        anchor.setAttribute('download', 'mdd_json_template.json');
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      function handleImport(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (!Array.isArray(parsed)) throw new Error('JSON 최상위 구조는 배열([ ])이어야 합니다.');
            if (parsed.length === 0) throw new Error('배열에 데이터가 없습니다.');

            const normalized = parsed.map((row, i) => {
              if (!row.date || typeof row.date !== 'string') {
                throw new Error(`${i + 1}번째 행: date 필드가 없거나 문자열이 아닙니다.`);
              }

              const usd = Number(row.closeUsd);
              const rawKrw = row.closeKrw;
              const krw = (rawKrw === null || rawKrw === undefined || rawKrw === '') ? null : Number(rawKrw);

              if (!Number.isFinite(usd) || usd <= 0) {
                throw new Error(`${i + 1}번째 행: closeUsd 값이 유효한 양수 숫자가 아닙니다.`);
              }

              if (krw !== null && (!Number.isFinite(krw) || krw <= 0)) {
                throw new Error(`${i + 1}번째 행: closeKrw 값은 null 또는 유효한 양수 숫자여야 합니다.`);
              }

              return {
                date: row.date,
                closeUsd: usd,
                closeKrw: krw
              };
            }).sort((a, b) => a.date.localeCompare(b.date));

            setManualMode('IMPORTED');
            setRawData(normalized);
            setDataSource('IMPORTED');
            setFetchStatus((prev) => ({ ...prev, error: null }));
            alert(`총 ${normalized.length}행의 사용자 데이터를 성공적으로 불러왔습니다.`);
          } catch (err) {
            alert(`데이터 형식 오류:\n${err.message}`);
          }
        };

        reader.readAsText(file);
        e.target.value = '';
      }

      function applyPreset(preset) {
        setSettings((prev) => ({ ...prev, ...preset }));
      }

      function buildInterpretation() {
        if (dataSource === 'LOADING') return ['데이터를 분석하고 있습니다...'];

        const lines = [];
        const primary = appState.primaryEngine;

        if (!primary) return ['엔진 설정 문제로 분석을 수행하지 못했습니다. 설정 탭을 확인해주세요.'];

        const targetWinRateText = formatPct(primary.target.targetWinRate);
        const targetDdText = primary.target.dd !== null ? formatPct(primary.target.dd) : '-';
        const usdCount = appState.usdEngine ? appState.usdEngine.timeSeries.length : 0;
        const krwCount = appState.krwEngine ? appState.krwEngine.timeSeries.length : 0;

        lines.push(`현재 분석 데이터 수는 USD ${usdCount}일, KRW ${krwCount}일입니다.`);
        lines.push(`목표 승률 ${targetWinRateText}를 만족하는 기준 낙폭은 ${targetDdText}입니다.`);

        if (primary.target.signalCount > 0) {
          lines.push(`해당 기준의 과거 신호 수는 ${primary.target.signalCount}회이며, 실제 승률은 ${formatPct(primary.target.winRate)}입니다.`);
        }

        if (primary.target.medianRecoveryDays !== null) {
          lines.push(`그 기준에서 본전 회복까지의 중앙 회복일은 ${formatDays(primary.target.medianRecoveryDays)}입니다.`);
        }

        if (primary.target.gapToTarget !== null) {
          if (primary.target.gapToTarget > 0) {
            lines.push(`현재 하락폭(${formatPct(primary.metrics.currentDd)})은 목표 기준보다 얕아 아직 추가 하락 ${formatPct(primary.target.gapToTarget)}이 더 필요합니다.`);
          } else {
            lines.push(`현재 하락폭(${formatPct(primary.metrics.currentDd)})이 목표 기준에 도달해 규칙상 매수 가능 구간입니다.`);
          }
        }

        lines.push(appState.gates.fearGate ? `공포 지수 조건은 충족되었습니다.` : `공포 지수 조건은 아직 충족되지 않았습니다.`);
        lines.push(appState.gates.lifeGate ? `생활 게이트도 통과한 상태입니다.` : `생활 게이트가 미충족 상태입니다. 보수적 접근이 필요합니다.`);
        lines.push(appState.gates.finalSignal ? `최종적으로 모든 조건이 맞아 실행 가능한 상태입니다.` : `아직 모든 조건이 맞지 않아 최종 실행 보류(WAIT) 상태입니다.`);

        return lines;
      }

      function renderDashboard() {
        const usdCount = appState.usdEngine ? appState.usdEngine.timeSeries.length : 0;
        const krwCount = appState.krwEngine ? appState.krwEngine.timeSeries.length : 0;
        const krwAutoAdjusted = meta.krwAnalysisStart && settings.startDate && meta.krwAnalysisStart > settings.startDate;

        return (
          <div className="space-y-6 animate-fade-in pb-10">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 rounded-2xl shadow-card gap-4">
              <div className="w-full md:w-auto">
                <label className="text-xs font-bold text-toss-subtext mb-1 block">현재 분석 자산</label>
                <select
                  value={settings.symbol}
                  onChange={handleAssetChange}
                  disabled={dataSource === 'LOADING'}
                  className="w-full md:w-72 p-2.5 bg-toss-gray border-none rounded-xl text-sm font-bold focus:ring-2 focus:ring-toss-blue outline-none cursor-pointer disabled:opacity-50"
                >
                  {assetsList.filter((a) => a.enabled !== false).map((a) => (
                    <option key={a.symbol} value={a.symbol}>{a.symbol} - {a.name || '자산'}</option>
                  ))}
                </select>
              </div>

              <div className="flex flex-wrap gap-2 md:gap-4 text-sm w-full md:w-auto justify-end">
                <div className="bg-toss-gray/50 px-3 py-2 rounded-xl flex-1 md:flex-none text-center">
                  <p className="text-[10px] text-toss-subtext font-bold mb-0.5">데이터 소스</p>
                  <p className="font-bold text-toss-text">
                    {dataSource === 'FETCHED' ? <span className="text-toss-blue">정상 (정적 JSON)</span> :
                     dataSource === 'SAMPLE' ? <span className="text-toss-subtext">SPY 샘플</span> :
                     dataSource === 'IMPORTED' ? <span className="text-green-600">수동 업로드</span> : '로딩중'}
                  </p>
                </div>
                <div className="bg-toss-gray/50 px-3 py-2 rounded-xl flex-1 md:flex-none text-center">
                  <p className="text-[10px] text-toss-subtext font-bold mb-0.5">분석 데이터 수</p>
                  <p className="font-bold text-toss-text text-xs">USD: {usdCount} KRW: {krwCount}</p>
                </div>
              </div>
            </div>

            {fetchStatus.error && (
              <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl text-sm font-semibold border border-yellow-200">
                ⚠️ 정적 JSON 로드 실패: {fetchStatus.error} → 현재는 SPY 샘플 데이터로 동작 중입니다.
              </div>
            )}

            {appState.configWarning && (
              <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-semibold border border-red-100 flex items-center">
                <span className="mr-2">⚠️</span> {appState.configWarning}
              </div>
            )}

            <Card title="현재 데이터 상태">
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm">
                {[
                  { label: 'USD 원본 시작일', value: meta.usdFirstDate || '-' },
                  { label: 'KRW 유효 시작일', value: meta.krwFirstDate || '-' },
                  { label: '사용자 요청 시작일', value: settings.startDate },
                  { label: 'USD 실분석 시작일', value: meta.usdAnalysisStart || '-' },
                  { label: 'KRW 실분석 시작일', value: meta.krwAnalysisStart || '-' }
                ].map(({ label, value }) => (
                  <div key={label} className="bg-toss-gray/50 p-3 rounded-xl border border-gray-100">
                    <p className="text-toss-subtext mb-1 font-medium text-xs">{label}</p>
                    <p className="font-bold text-toss-text">{value}</p>
                  </div>
                ))}
              </div>
            </Card>

            {krwAutoAdjusted && (
              <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-semibold border border-red-100">
                ⚠️ KRW 분석은 환율 데이터가 존재하는 첫 날짜({meta.krwFirstDate})부터만 유효합니다. KRW 엔진 시작일을 자동 보정했습니다.
              </div>
            )}

            <Card className={`border-l-4 transition-colors ${appState.gates.finalSignal ? 'border-l-toss-blue bg-toss-light' : 'border-l-toss-gray'}`}>
              <div className="flex flex-col md:flex-row justify-between md:items-center mb-6 gap-4">
                <div>
                  <h2 className="text-2xl font-bold text-toss-text">최종 매수 시그널</h2>
                  <p className="text-sm text-toss-subtext mt-1">Symbol: {settings.symbol} | Primary Mode: {settings.primarySignalMode}</p>
                </div>
                <Badge active={appState.gates.finalSignal} color={appState.gates.finalSignal ? 'blue' : 'gray'}>
                  {appState.gates.finalSignal ? 'TRIGGERED (조건 충족)' : 'WAIT (대기 중)'}
                </Badge>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-5 rounded-xl bg-white/50 border border-gray-100 flex flex-col justify-between">
                  <h4 className="font-bold text-toss-text mb-4 flex items-center">
                    <span className={`w-2.5 h-2.5 rounded-full mr-2 ${appState.gates.lifeGate ? 'bg-green-500' : 'bg-red-500'}`}></span>
                    생활 게이트 (Life Gate)
                  </h4>
                  <div className="space-y-3 text-sm font-medium text-toss-text">
                    <div className="flex justify-between items-center bg-gray-50/80 p-2.5 rounded-lg">
                      <span>현금 분리 확보</span>
                      <Badge active={settings.cashReady} color={settings.cashReady ? 'green' : 'red'}>{settings.cashReady ? 'PASS' : 'FAIL'}</Badge>
                    </div>
                    <div className="flex justify-between items-center bg-gray-50/80 p-2.5 rounded-lg">
                      <span>소득 &gt; 지출 달성</span>
                      <Badge active={settings.incomeGreater} color={settings.incomeGreater ? 'green' : 'red'}>{settings.incomeGreater ? 'PASS' : 'FAIL'}</Badge>
                    </div>
                  </div>
                </div>

                <div className="p-5 rounded-xl bg-white/50 border border-gray-100 flex flex-col justify-between">
                  <h4 className="font-bold text-toss-text mb-4 flex items-center">
                    <span className={`w-2.5 h-2.5 rounded-full mr-2 ${appState.gates.marketGate ? 'bg-green-500' : 'bg-red-500'}`}></span>
                    시장 게이트 (Market Gate)
                  </h4>

      function renderVerify() {
        const primary = appState.primaryEngine;

        let isAscending = true;
        let usdPositive = true;

        for (let i = 0; i < rawData.length - 1; i++) {
          if (rawData[i].date > rawData[i + 1].date) {
            isAscending = false;
            break;
          }
        }

        for (let i = 0; i < rawData.length; i++) {
          if (!isValidPositiveNumber(rawData[i].closeUsd)) {
            usdPositive = false;
            break;
          }
        }

        const krwNullCount = rawData.filter((r) => r.closeKrw === null || r.closeKrw === undefined).length;
        const krwValidCount = rawData.filter((r) => isValidPositiveNumber(r.closeKrw)).length;
        const krwAnomalyCount = rawData.length - krwNullCount - krwValidCount;

        const validEngineStep = Number.isFinite(Number(settings.engineStep)) && Number(settings.engineStep) > 0;
        const validTableDisplayStep = Number.isFinite(Number(settings.tableDisplayStep)) && Number(settings.tableDisplayStep) > 0;
        const hasWinRateTable = primary && primary.winRateTableFull && primary.winRateTableFull.length > 0;
        const targetExists = primary && primary.target && primary.target.dd !== null;
        const krwStartCorrectlyAdjusted =
          meta.krwAnalysisStart !== null &&
          meta.krwFirstDate !== null &&
          meta.krwAnalysisStart >= meta.krwFirstDate;

        const tests = [
          { id: 'F1', name: 'Assets 목록 준비', expected: 'TRUE', actual: assetsList.length > 0 ? 'TRUE' : 'FALSE', pass: assetsList.length > 0 },
          { id: 'F2', name: '선택 자산 Price 로드', expected: 'TRUE', actual: fetchStatus.price === true ? 'TRUE' : (dataSource === 'SAMPLE' || dataSource === 'IMPORTED' ? 'SKIP' : 'FALSE'), pass: dataSource === 'SAMPLE' || dataSource === 'IMPORTED' ? null : fetchStatus.price === true },
          { id: 'F3', name: 'USDKRW 환율 로드', expected: 'TRUE', actual: fetchStatus.fx === true ? 'TRUE' : (dataSource === 'SAMPLE' || dataSource === 'IMPORTED' ? 'SKIP' : 'FALSE'), pass: dataSource === 'SAMPLE' || dataSource === 'IMPORTED' ? null : fetchStatus.fx === true },
          { id: 'D1', name: '날짜 오름차순 정렬', expected: 'TRUE', actual: isAscending ? 'TRUE' : 'FALSE', pass: isAscending },
          { id: 'D2', name: 'USD 가격 양수 여부', expected: 'TRUE', actual: usdPositive ? 'TRUE' : 'FALSE', pass: usdPositive },
          { id: 'D3', name: '유효한 승률 엔진 단위', expected: 'TRUE', actual: validEngineStep ? 'TRUE' : 'FALSE', pass: validEngineStep },
          { id: 'D4', name: '유효한 테이블 표시 간격', expected: 'TRUE', actual: validTableDisplayStep ? 'TRUE' : 'FALSE', pass: validTableDisplayStep },
          { id: 'K1', name: 'KRW 유효 행 수 > 0', expected: '> 0', actual: String(krwValidCount), pass: krwValidCount > 0 },
          { id: 'K2', name: 'KRW 이상값 행 수 (0이어야 정상)', expected: '0', actual: String(krwAnomalyCount), pass: krwAnomalyCount === 0 },
          { id: 'K3', name: 'KRW 시작일 보정 정상', expected: 'TRUE', actual: krwStartCorrectlyAdjusted ? 'TRUE' : (meta.krwFirstDate === null ? 'SKIP' : 'FALSE'), pass: meta.krwFirstDate === null ? null : krwStartCorrectlyAdjusted },
          { id: 'E1', name: '엔진 실행 성공', expected: 'TRUE', actual: primary ? 'TRUE' : 'FALSE', pass: primary ? true : false },
          { id: 'E2', name: 'MDD <= 0', expected: '<= 0', actual: primary ? primary.metrics.mdd.toFixed(4) : 'N/A', pass: primary ? primary.metrics.mdd <= 0 : null },
          { id: 'W1', name: '승률 테이블 생성', expected: 'TRUE', actual: hasWinRateTable ? 'TRUE' : 'FALSE', pass: hasWinRateTable },
          { id: 'W2', name: '목표 낙폭 계산 성공', expected: 'TRUE', actual: targetExists ? 'TRUE' : 'FALSE', pass: targetExists },
          { id: 'W3', name: '최종 Buy Signal 논리 일치', expected: appState.gates.finalSignal ? 'TRUE' : 'FALSE', actual: (appState.gates.lifeGate && appState.gates.marketGate) ? 'TRUE' : 'FALSE', pass: appState.gates.finalSignal === (appState.gates.lifeGate && appState.gates.marketGate) }
        ];

        return (
          <div className="space-y-6 animate-fade-in pb-10">
            <Card title="시스템 검증 (System Verification)">
              <p className="text-sm text-toss-subtext mb-5">정적 JSON 로딩, 데이터 무결성, KRW 품질, 엔진 연산, 승률 테이블 생성을 점검합니다.</p>
              <div className="overflow-x-auto -mx-5 md:mx-0">
                <table className="w-full text-sm text-left">
                  <thead className="bg-toss-gray text-toss-subtext border-b border-gray-200">
                    <tr>
                      <th className="py-3 px-5 font-semibold">Test Case</th>
                      <th className="py-3 px-5 font-semibold">Expected</th>
                      <th className="py-3 px-5 font-semibold">Actual</th>
                      <th className="py-3 px-5 font-semibold">결과</th>
                    </tr>
                  </thead>
                  <tbody>
                    {tests.map((t) => (
                      <tr key={t.id} className="border-b border-gray-100 hover:bg-gray-50">
                        <td className="py-3 px-5 font-medium text-toss-text">{t.id}: {t.name}</td>
                        <td className="py-3 px-5 font-mono text-gray-600">{t.expected}</td>
                        <td className="py-3 px-5 font-mono text-gray-600">{t.actual}</td>
                        <td className="py-3 px-5"><ResultBadge pass={t.pass} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>

            <Card title="KRW 데이터 상태 상세">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                {[
                  { label: '전체 행 수', value: String(rawData.length) },
                  { label: 'KRW 유효 행 수', value: String(krwValidCount), highlight: krwValidCount > 0 },
                  { label: 'KRW null 행 수 (정상)', value: String(krwNullCount) },
                  { label: 'KRW 이상값 행 수', value: String(krwAnomalyCount), warn: krwAnomalyCount > 0 }
                ].map(({ label, value, highlight, warn }) => (
                  <div key={label} className={`p-3 rounded-xl border ${warn ? 'bg-red-50 border-red-200' : highlight ? 'bg-toss-light border-toss-blue/20' : 'bg-toss-gray/50 border-gray-100'}`}>
                    <p className="text-xs font-medium text-toss-subtext mb-1">{label}</p>
                    <p className={`font-bold text-lg ${warn ? 'text-red-600' : highlight ? 'text-toss-blue' : 'text-toss-text'}`}>{value}</p>
                  </div>
                ))}
              </div>
              <div className="mt-4 text-xs text-toss-subtext space-y-1">
                <p>• KRW null 행: 환율 데이터 시작 전 구간 — 정상입니다.</p>
                <p>• KRW 이상값 행: 0, NaN, 음수 등 비정상 값 — 0이어야 합니다.</p>
                <p>• KRW 실분석 시작일: {meta.krwAnalysisStart || '-'} / KRW 최초 유효일: {meta.krwFirstDate || '-'}</p>
              </div>
            </Card>
          </div>
        );
      }

      function renderGuide() {
        return (
          <div className="space-y-6 animate-fade-in pb-10">
            <Card title="1. 이 앱이 하는 일">
              <ul className="space-y-2 text-sm text-toss-text font-medium">
                <li className="flex items-start"><span className="text-toss-blue mr-2">•</span> 종가 기준으로 현재 하락폭(DD)과 최대 하락폭(MDD)을 계산합니다.</li>
                <li className="flex items-start"><span className="text-toss-blue mr-2">•</span> 특정 낙폭을 처음 하향 돌파한 날을 추가매수 신호로 보고, 이후 본전 회복 여부를 추적합니다.</li>
                <li className="flex items-start"><span className="text-toss-blue mr-2">•</span> 그래서 단순 체류비율이 아니라 실제 물타기 승률과 회복일을 보여줍니다.</li>
              </ul>
            </Card>

            <Card title="2. 핵심 개념">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {[
                  { title: '목표 승률', desc: '내가 원하는 최소 승률입니다. 이 값을 만족하는 가장 얕은 낙폭을 목표 낙폭으로 채택합니다.' },
                  { title: '실제 승률', desc: '해당 낙폭 기준을 과거에 처음 하향 돌파했을 때, 이후 본전 회복에 성공한 비율입니다.' },
                  { title: '중앙 회복일', desc: '본전 회복까지 걸린 일수의 중앙값입니다. 평균보다 왜곡이 적습니다.' },
                  { title: '목표까지 가격 간격', desc: '현재 가격이 목표 낙폭 가격보다 얼마나 더 내려와야 하는지 보여줍니다.' }
                ].map(({ title, desc }) => (
                  <div key={title} className="bg-gray-50 p-4 rounded-xl">
                    <p className="font-bold text-toss-blue mb-1">{title}</p>
                    <p className="text-sm text-toss-subtext">{desc}</p>
                  </div>
                ))}
              </div>
            </Card>

            <Card title="3. 설정값 해석">
              <div className="space-y-3 text-sm text-toss-text">
                <p><b>승률 엔진 단위</b> : 실제 승률 계산 해상도입니다. 0.01이면 1% 단위로 계산합니다.</p>
                <p><b>테이블 표시 간격</b> : 승률 테이블을 화면에 보여줄 때의 요약 간격입니다. 계산 자체와는 별개입니다.</p>
                <p><b>Primary Signal Mode</b> : 최종 판단을 USD 기준으로 할지, KRW 기준으로 할지 정하는 기준 엔진입니다.</p>
              </div>
            </Card>

            <Card title="4. 이 앱이 하지 않는 일">
              <ul className="space-y-2 text-sm text-red-600 font-medium">
                <li className="flex items-start"><span className="mr-2">•</span> 미래 가격을 예측하지 않습니다.</li>
                <li className="flex items-start"><span className="mr-2">•</span> 자동 매매를 실행하지 않습니다.</li>
                <li className="flex items-start"><span className="mr-2">•</span> 배당재투자(PV 기준) MDD는 아직 적용하지 않았습니다. 현재는 종가 기준입니다.</li>
              </ul>
            </Card>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans flex flex-col items-center">
          <div className="w-full max-w-6xl p-5 md:p-8 pt-10">
            <header className="mb-6 pl-2">
              <h1 className="text-2xl md:text-3xl font-extrabold text-toss-text tracking-tight">MDD Target Tracker</h1>
            </header>

            <nav className="flex space-x-2 mb-6 overflow-x-auto no-scrollbar pb-2 px-2">
              {[
                { id: 'dashboard', label: '대시보드' },
                { id: 'detail', label: '승률 테이블' },
                { id: 'settings', label: '설정 및 데이터' },
                { id: 'verify', label: '시스템 검증' },
                { id: 'guide', label: '이용 가이드' }
              ].map((tab) => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all ${
                    activeTab === tab.id ? 'bg-toss-text text-white shadow-md' : 'bg-white text-toss-subtext border border-gray-200'
                  }`}
                >
                  {tab.label}
                </button>
              ))}
            </nav>

            <main className="px-2">
              {activeTab === 'dashboard' && renderDashboard()}
              {activeTab === 'detail' && renderDetail()}
              {activeTab === 'settings' && renderSettings()}
              {activeTab === 'verify' && renderVerify()}
              {activeTab === 'guide' && renderGuide()}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
